<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Satisfactory Visual Planner</title>
  <link rel="stylesheet" href="/web/styles.css">
</head>
<body>
  <div id="app" class="app">
    <aside class="left-panel">
      <h1>Factory Planner</h1>
      <label for="itemInput">Item</label>
      <input id="itemInput" list="itemsList" value="Wire">
      <datalist id="itemsList"></datalist>

      <label for="rateInput">Items per minute</label>
      <input id="rateInput" type="number" min="0.0001" step="0.1" placeholder="Optional">

      <label for="strategyInput">Recipe strategy</label>
      <select id="strategyInput">
        <option value="default">Default recipes</option>
        <option value="custom">Custom choices</option>
      </select>

      <label for="clockInput">Clock speed</label>
      <select id="clockInput">
        <option value="50">50%</option>
        <option value="100" selected>100%</option>
        <option value="250">250%</option>
      </select>

      <label class="checkbox-row" for="simplifyRatiosInput">
        <input id="simplifyRatiosInput" type="checkbox" checked>
        <span>Simplify split ratios</span>
      </label>

      <h2>Unlocked Transport</h2>
      <div class="unlock-grid" id="beltUnlocks">
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="1" checked disabled><span>Mk.1 belt</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="2" checked><span>Mk.2 belt</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="3" checked><span>Mk.3 belt</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="4" checked><span>Mk.4 belt</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="5" checked><span>Mk.5 belt</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="belt" data-tier="6" checked><span>Mk.6 belt</span></label>
      </div>
      <div class="unlock-grid" id="pipeUnlocks">
        <label class="checkbox-row"><input type="checkbox" data-transport="pipe" data-tier="1" checked disabled><span>Pipe Mk.1</span></label>
        <label class="checkbox-row"><input type="checkbox" data-transport="pipe" data-tier="2" checked><span>Pipe Mk.2</span></label>
      </div>

      <button id="calculateButton">Calculate</button>
      <div id="error" class="error"></div>

      <h2>Manual Recipe Choice</h2>
      <label for="choiceItem">Item</label>
      <input id="choiceItem" list="itemsList" placeholder="Screw">
      <label for="choiceRecipe">Recipe</label>
      <select id="choiceRecipe"></select>
      <button id="addChoiceButton" class="secondary">Add Choice</button>
      <div id="choices"></div>
    </aside>

    <div id="leftSplitter" class="splitter"></div>

    <main id="graphShell" class="graph-shell">
      <div class="graph-toolbar">
        <button id="zoomOutButton" class="icon-button" title="Zoom out">-</button>
        <button id="zoomInButton" class="icon-button" title="Zoom in">+</button>
        <button id="fitGraphButton" class="toolbar-button">Fit</button>
        <button id="resetViewButton" class="toolbar-button">Reset</button>
      </div>
      <div id="graphNotice" class="graph-notice hidden"></div>
      <div id="graph" class="graph">
        <svg id="edges" class="edges"></svg>
      </div>
    </main>

    <div id="rightSplitter" class="splitter"></div>

    <aside class="right-panel">
      <h2>Output</h2>
      <div id="outputRate" class="summary"></div>
      <h2>Machines</h2>
      <div id="machines" class="summary"></div>
      <h2>Power</h2>
      <div id="power" class="summary"></div>
      <h2>Transport</h2>
      <div id="transport" class="summary"></div>
      <h2>Raw Resources</h2>
      <div id="resources" class="summary"></div>
      <h2>Selected Recipes</h2>
      <div id="selectedRecipes" class="summary"></div>
    </aside>
  </div>

  <aside id="recipeDrawer" class="recipe-drawer" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <span class="eyebrow">Recipes</span>
        <h2 id="drawerTitle">Select Recipe</h2>
      </div>
      <button id="closeDrawerButton" class="icon-button" title="Close">x</button>
    </div>
    <div id="recipeCards" class="recipe-cards"></div>
  </aside>

  <script src="/web/app.js"></script>
</body>
</html>
